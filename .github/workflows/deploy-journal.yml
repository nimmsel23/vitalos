name: Deploy Journal PWA

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'journal-dev/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Submodules via HTTPS + Token
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_SUBMODULE_TOKEN || secrets.GITHUB_TOKEN }}@github.com/".insteadOf "git@github.com:"
          git submodule sync
          git submodule update --init --recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install (Workspaces)
        run: npm ci

      - name: Build Journal
        run: npm run build:cloud --workspace=journal-dev

      - name: Deploy Journal to Firebase Hosting & Rules
        run: |
          cd journal-dev
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT || secrets.FIREBASE_SERVICE_ACCOUNT_FITNESS_AOS }}' > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json \
            npx firebase-tools@latest deploy --only hosting,firestore:rules \
            --project fitness-aos --non-interactive
