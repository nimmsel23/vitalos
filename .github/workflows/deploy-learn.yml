name: Deploy Learn PWA

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'learn-dev'
      - 'learn-dev/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Submodules via HTTPS + Token
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_SUBMODULE_TOKEN || secrets.GITHUB_TOKEN }}@github.com/".insteadOf "git@github.com:"
          git submodule sync
          git submodule update --init --recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install (Workspaces)
        run: npm ci

      - name: Build Learn
        run: npm run build:firebase --workspace=learn-dev

      - name: Deploy Learn to Firebase Hosting
        run: |
          cd learn-dev
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT || secrets.FIREBASE_SERVICE_ACCOUNT_FITNESS_AOS }}' > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json \
            npx firebase-tools@latest deploy --only hosting \
            --project fitness-aos --non-interactive
