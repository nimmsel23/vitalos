name: Deploy Fuel PWA

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'fuel-dev/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Submodules via HTTPS + Token
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_SUBMODULE_TOKEN || secrets.GITHUB_TOKEN }}@github.com/".insteadOf "git@github.com:"
          git submodule sync
          git submodule update --init --recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install (Workspaces)
        run: npm ci

      - name: Firebase config schreiben
        run: echo "$FIREBASE_CONFIG" > fuel-dev/src/firebase.config.js
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}

      - name: Build Fuel
        run: npm run build:cloud --workspace=fuel-dev

      - name: Deploy Fuel to Firebase Hosting
        run: |
          cd fuel-dev
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT || secrets.FIREBASE_SERVICE_ACCOUNT_FITNESS_AOS }}' > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json \
            npx firebase-tools@latest deploy --only hosting \
            --project fitness-aos --non-interactive
