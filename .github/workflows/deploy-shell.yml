# Deployt die VitalOS-Shell (vitalos.web.app) aus dem Meta-Repo.
#
# Warum hier und nicht in den Sub-Repos: Die Apps importieren sich gegenseitig
# (Cross-Repo-Aliases). Nur ein Checkout MIT Submodules hat alle Quellen —
# per-Repo-Workflows in fitness/fuel/journal/habits/learn können nie bauen
# und wurden deshalb deaktiviert (2026-07-03).
#
# Submodule-Zugriff: journal-dev, habits-dev, learn-dev sind PRIVATE.
# Submodule-Zugriff: alle Sub-Repos sind seit 2026-07-03 public —
# GITHUB_TOKEN reicht. (Historie: journal/habits/learn waren private,
# deshalb der insteadOf-Umweg statt checkout submodules: true über SSH-URLs.)

name: Deploy VitalOS Shell

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (ohne Submodules)
        uses: actions/checkout@v4

      - name: Submodules via HTTPS + Token
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_SUBMODULE_TOKEN || secrets.GITHUB_TOKEN }}@github.com/".insteadOf "git@github.com:"
          git submodule sync
          git submodule update --init --recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # npm-workspaces (fitness/fuel/journal/habits/learn) — ein ci installiert alles.
      # .npmrc: legacy-peer-deps wegen eslint@10-Konflikt in fitness-dev.
      - name: Install (Workspaces)
        run: npm install --legacy-peer-deps

      - name: Build (firebase mode)
        run: npm run build:firebase

      # Firestore-Rules werden hier bewusst NICHT deployt. Rules sind
      # projekt-global und sicherheitskritisch — Deploy nur manuell über
      # deploy-firestore-rules.yml (workflow_dispatch). SSOT: firestore.rules.
      - name: Deploy Hosting (vitalos)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: fitness-aos
          target: vitalos
          channelId: live

      # continue-on-error: eine fehlgeschlagene Notification darf den Run nicht
      # rot färben — Build+Deploy sind dann bereits erfolgreich durch.
      - name: Send Telegram Notification
        if: success()
        continue-on-error: true
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🚀 VitalOS (Shell) erfolgreich deployed (master)!
            
            🔗 Live-URL: https://vitalos.web.app
            
            Commit: ${{ github.event.head_commit.message }}
