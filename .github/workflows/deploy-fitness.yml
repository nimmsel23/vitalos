name: Deploy Fitness PWA

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'fitness-app'
      - 'fitness-app/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Submodules via HTTPS + Token
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_SUBMODULE_TOKEN || secrets.GITHUB_TOKEN }}@github.com/".insteadOf "git@github.com:"
          git submodule sync
          git submodule update --init --recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install (Workspaces)
        run: npm ci

      - name: Firebase config schreiben
        run: |
          if [ -n "$FIREBASE_CONFIG" ]; then
            echo "$FIREBASE_CONFIG" > fitness-app/firebase.config.js
          fi
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}

      - name: Build Fitness
        run: npm run build:firebase --workspace=fitness-app

      # KEIN firestore:rules/indexes mehr: Rules-SSOT ist ~/vitalos/firestore.rules,
      # deployed nur von deploy-shell.yml. Per-App-Rules haben sich gegenseitig
      # überschrieben (letzter Deploy gewann → fitness/kb-Reads verweigert).
      - name: Deploy Fitness to Firebase Hosting
        run: |
          cd fitness-app
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT || secrets.FIREBASE_SERVICE_ACCOUNT_FITNESS_AOS }}' > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json \
            npx firebase-tools@latest deploy --only hosting \
            --project fitness-aos --non-interactive
