<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1629"/>
      <stop offset="100%" stop-color="#080b12"/>
    </linearGradient>
    <linearGradient id="vgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0"/>
      <stop offset="40%" stop-color="#60a5fa"/>
      <stop offset="60%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#1e293b" stroke-width="1.5" opacity="0.6"/>

  <!-- Pulse line -->
  <polyline
    points="76,256 148,256 172,210 196,302 220,230 244,280 268,256 340,256"
    fill="none" stroke="url(#pulse)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"
    filter="url(#glow)" opacity="0.5"
  />

  <!-- V mark -->
  <polyline
    points="168,168 256,340 344,168"
    fill="none" stroke="url(#vgrad)" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Center dot -->
  <circle cx="256" cy="340" r="14" fill="url(#vgrad)" filter="url(#glow)"/>
</svg>
