<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#080b12" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Fitness Centre</title>
    <script>
      (function() {
        const theme = localStorage.getItem('fitness-theme') || 'nordic';
        const mode = localStorage.getItem('fitness-theme-mode') || 'manual';
        if (mode === 'manual') {
          document.documentElement.setAttribute('data-theme', theme);
        } else {
          const hour = new Date().getHours();
          const dark = localStorage.getItem('fitness-circ-dark') || 'nordic';
          const light = localStorage.getItem('fitness-circ-light') || 'honey';
          document.documentElement.setAttribute('data-theme', (hour >= 8 && hour < 20) ? light : dark);
        }
      })();
    </script>
    <script src="/offline-queue.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').then(reg => {
          window.__swRegistration = reg
          const notify = () => window.dispatchEvent(new CustomEvent('sw-update-available'))
          if (reg.waiting) notify()
          reg.addEventListener('updatefound', () => {
            const nw = reg.installing
            if (!nw) return
            nw.addEventListener('statechange', () => {
              if (nw.state === 'installed' && navigator.serviceWorker.controller) notify()
            })
          })
        }).catch(() => {})
        let reloading = false
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (reloading) return
          reloading = true
          window.location.reload()
        })
      }
    </script>
  </body>
</html>
