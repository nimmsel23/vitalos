<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Fitness Centre</title>
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0a0d14" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
    :root {
      --bg: #080b12; --bg2: #0c1019; --panel: #111827; --card: #151d2e;
      --card-hover: #1a2439; --line: #1e2d44; --ink: #eef1f8;
      --muted: #7b8ba5; --dim: #4a5874;
      --accent: #5eead4; --accent-glow: rgba(94,234,212,0.12); --accent-2: #f59e0b;
      --red: #ef4444; --green: #22c55e; --blue: #3b82f6;
      --purple: #a78bfa; --orange: #f97316; --pink: #ec4899;
      --glass: rgba(17,24,39,0.75); --glass-border: rgba(94,234,212,0.08);
      --radius: 14px; --radius-sm: 10px; --radius-xs: 6px;
      --shadow: 0 8px 32px rgba(0,0,0,0.3); --shadow-glow: 0 0 40px rgba(94,234,212,0.06);
      --font: "Inter", system-ui, -apple-system, sans-serif;
      --mono: "JetBrains Mono", "Fira Code", monospace;
      --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    [data-theme="latte"] {
      --bg: #f5f0e8; --bg2: #ebe5db; --panel: #e2dbd0; --card: #f0ebe3;
      --card-hover: #e8e2d8; --line: #cdc4b6; --ink: #1e1c19;
      --muted: #6b6356; --dim: #9a9080;
      --accent: #0e7a73; --accent-glow: rgba(14,122,115,0.08); --accent-2: #d97706;
      --red: #dc2626; --green: #16a34a; --blue: #2563eb;
      --purple: #7c3aed; --orange: #ea580c; --pink: #db2777;
      --glass: rgba(226,219,208,0.8); --glass-border: rgba(14,122,115,0.1);
      --shadow: 0 8px 32px rgba(0,0,0,0.08); --shadow-glow: none;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; -webkit-tap-highlight-color: transparent; }
    body { font: 14px/1.55 var(--font); background: var(--bg); color: var(--ink);
      height: 100%; overflow: hidden; display: flex; flex-direction: column; }

    /* ── LAYOUT ── */
    #app { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding-top: var(--safe-top); }
    .topbar { display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; background: var(--glass); backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border);
      z-index: 20; min-height: 52px; }
    .topbar .brand { display: flex; align-items: center; gap: 8px; font-weight: 800;
      font-size: 16px; letter-spacing: -0.02em; }
    .topbar .brand svg { width: 24px; height: 24px; }
    .topbar-actions { display: flex; gap: 6px; }
    .topbar-actions button { background: var(--card); border: 1px solid var(--line);
      color: var(--muted); border-radius: var(--radius-sm); padding: 6px 10px;
      font: inherit; font-size: 12px; cursor: pointer; transition: all 120ms; }
    .topbar-actions button:hover { color: var(--ink); border-color: var(--accent); }
    .view-container { flex: 1; overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
    .view { display: none; padding: 16px 16px 100px; max-width: 720px; margin: 0 auto; width: 100%; }
    .view.active { display: block; }

    /* ── BOTTOM NAV ── */
    .bottom-nav { display: flex; background: var(--glass); backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--glass-border);
      padding: 6px 8px calc(6px + var(--safe-bottom)); z-index: 20; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 2px; padding: 6px 4px; border-radius: var(--radius-sm); cursor: pointer;
      color: var(--dim); font-size: 10px; font-weight: 600; letter-spacing: 0.03em;
      transition: all 140ms; border: none; background: none; -webkit-appearance: none; }
    .nav-item svg { width: 22px; height: 22px; transition: all 140ms; }
    .nav-item.active { color: var(--accent); }
    .nav-item.active svg { filter: drop-shadow(0 0 6px rgba(94,234,212,0.4)); }

    /* ── CARDS ── */
    .card { background: var(--card); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
    .card h2 { font-size: 15px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.01em; }
    .card h3 { font-size: 13px; color: var(--muted); font-weight: 600; margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: 0.06em; }

    /* ── DASHBOARD ── */
    .hero-grid { display: grid; grid-template-columns: 130px 1fr; gap: 16px; align-items: center; }
    @media (max-width: 480px) { .hero-grid { grid-template-columns: 1fr; } }
    .ring-box { position: relative; width: 120px; aspect-ratio: 1; margin: 0 auto; }
    .ring-box svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .ring-box .bg-ring { fill: none; stroke: var(--line); stroke-width: 10; }
    .ring-box .fg-ring { fill: none; stroke: url(#ringGrad); stroke-width: 10;
      stroke-linecap: round; stroke-dasharray: 377; stroke-dashoffset: 377;
      transition: stroke-dashoffset 500ms cubic-bezier(0.4,0,0.2,1); }
    .ring-label { position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; }
    .ring-label .pct { font-size: 26px; font-weight: 800; letter-spacing: -0.03em; color: var(--accent); }
    .ring-label .sub { font-size: 9px; color: var(--muted); font-weight: 700; letter-spacing: 0.08em; }
    .stat-row { display: flex; gap: 8px; flex-direction: column; }
    .stat-pill { background: var(--bg2); border: 1px solid var(--line);
      border-radius: var(--radius-sm); padding: 10px 14px; }
    .stat-pill .label { font-size: 10px; color: var(--muted); font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase; }
    .stat-pill .val { font-size: 18px; font-weight: 800; margin-top: 2px; }

    /* ── BLOCK SELECTOR ── */
    .block-grid { display: grid; gap: 8px; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); }
    .block-btn { background: var(--bg2); border: 2px solid var(--line);
      border-radius: var(--radius-sm); padding: 10px; text-align: center;
      cursor: pointer; transition: all 150ms; font: inherit; color: var(--ink); }
    .block-btn .name { font-weight: 800; font-size: 13px; }
    .block-btn:hover { border-color: var(--dim); }
    .block-btn.active { border-color: var(--accent); background: var(--accent-glow);
      box-shadow: 0 0 20px rgba(94,234,212,0.1); }

    /* ── HEATMAP ── */
    .heatmap { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .heatmap-cell { aspect-ratio: 1; border-radius: var(--radius-xs);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; border: 1px solid var(--line);
      background: var(--bg2); gap: 1px; }
    .heatmap-cell .day-label { font-size: 9px; color: var(--dim); }
    .heatmap-cell.hit { background: rgba(94,234,212,0.12); border-color: rgba(94,234,212,0.3); color: var(--accent); }
    .heatmap-cell.today { border-color: var(--accent); }

    /* ── SESSION TABLE ── */
    .ex-table { width: 100%; border-collapse: collapse; }
    .ex-table th { text-align: left; padding: 6px 4px; font-size: 10px; color: var(--dim);
      font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      border-bottom: 1px solid var(--line); }
    .ex-table td { padding: 4px; }
    .ex-table input { width: 100%; padding: 7px 8px; background: var(--bg2);
      border: 1px solid var(--line); border-radius: var(--radius-xs); color: var(--ink);
      font: 13px var(--font); transition: border-color 120ms; }
    .ex-table input:focus { outline: none; border-color: var(--accent); }
    .ex-table input:disabled { opacity: 0.3; }
    .del-btn { background: none; border: none; color: var(--dim); cursor: pointer;
      font-size: 16px; padding: 4px 6px; border-radius: var(--radius-xs); transition: all 120ms; }
    .del-btn:hover { color: var(--red); background: rgba(239,68,68,0.1); }

    /* ── WGER SEARCH ── */
    .search-wrap { position: relative; margin-bottom: 10px; }
    .search-wrap input { width: 100%; padding: 10px 12px 10px 36px; background: var(--bg2);
      border: 1px solid var(--line); border-radius: var(--radius-sm); color: var(--ink);
      font: 14px var(--font); transition: border-color 120ms; }
    .search-wrap input:focus { outline: none; border-color: var(--accent); }
    .search-wrap .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--dim); pointer-events: none; }
    .search-wrap .search-spinner { position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      width: 14px; height: 14px; border: 2px solid var(--accent); border-top-color: transparent;
      border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    .search-wrap .search-spinner.active { display: block; }
    @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
    .search-results { position: absolute; top: 100%; left: 0; right: 0; background: var(--panel);
      border: 1px solid var(--line); border-radius: var(--radius-sm); max-height: 220px;
      overflow-y: auto; z-index: 50; box-shadow: var(--shadow); display: none; }
    .search-results.open { display: block; }
    .search-item { padding: 9px 12px; cursor: pointer; border-bottom: 1px solid var(--line);
      transition: background 80ms; font-size: 13px; }
    .search-item:last-child { border-bottom: none; }
    .search-item:hover, .search-item.hl { background: var(--accent-glow); }
    .search-item .si-name { font-weight: 600; }
    .search-item .si-meta { font-size: 11px; color: var(--dim); margin-top: 1px; }
    .muscle-filter-badge { display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; background: var(--accent-glow); border: 1px solid rgba(94,234,212,0.2);
      border-radius: 20px; font-size: 11px; color: var(--accent); margin-bottom: 8px; }
    .muscle-filter-badge button { background: none; border: none; color: var(--accent);
      cursor: pointer; font-size: 13px; padding: 0; line-height: 1; }

    /* ── QUICK PARSE ── */
    .quick-row { display: flex; gap: 6px; margin-bottom: 10px; }
    .quick-row input { flex: 1; font-family: var(--mono); font-size: 13px;
      padding: 9px 12px; background: var(--bg2); border: 1px solid var(--line);
      border-radius: var(--radius-sm); color: var(--ink); }
    .quick-row input::placeholder { color: var(--dim); }
    .quick-row input:focus { outline: none; border-color: var(--accent-2); }

    /* ── EFFORT / MOOD ── */
    .effort-bar { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
    .effort-bar input[type=range] { flex: 1; -webkit-appearance: none; height: 6px;
      background: var(--line); border-radius: 3px; border: none; padding: 0; }
    .effort-bar input[type=range]::-webkit-slider-thumb { -webkit-appearance: none;
      width: 20px; height: 20px; border-radius: 50%; background: var(--accent);
      cursor: pointer; box-shadow: 0 0 10px rgba(94,234,212,0.3); }
    .mood-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .mood-btn { padding: 7px 10px; border-radius: var(--radius-sm); border: 1px solid var(--line);
      background: var(--bg2); cursor: pointer; font-size: 18px; transition: all 120ms; }
    .mood-btn.active { border-color: var(--accent); box-shadow: 0 0 12px rgba(94,234,212,0.15);
      background: var(--accent-glow); }

    /* ── MUSCLE BODY MAP ── */
    .bodymap-container { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .bodymap-toggle { display: flex; gap: 4px; background: var(--bg2); border: 1px solid var(--line);
      border-radius: var(--radius-sm); padding: 3px; }
    .bodymap-toggle button { padding: 5px 14px; border-radius: calc(var(--radius-sm) - 2px);
      border: none; background: none; color: var(--muted); font: 12px/1 var(--font); font-weight: 700;
      cursor: pointer; transition: all 120ms; letter-spacing: 0.04em; text-transform: uppercase; }
    .bodymap-toggle button.active { background: var(--accent); color: #062026; }
    #bodymapChart { width: 100%; max-width: 280px; min-height: 380px; }
    .muscle-row { display: flex; align-items: center; gap: 8px; padding: 8px 10px;
      background: var(--bg2); border: 1px solid var(--line); border-radius: var(--radius-sm);
      font-size: 12px; margin-bottom: 4px; }
    .muscle-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .muscle-row .name { flex: 1; font-weight: 600; }
    .muscle-row .hits { color: var(--muted); font-weight: 700; font-family: var(--mono); font-size: 11px; }
    .group-header { display: flex; align-items: center; gap: 8px; margin: 14px 0 6px;
      padding-bottom: 6px; border-bottom: 1px solid var(--line); }
    .group-header .dot { width: 8px; height: 8px; border-radius: 50%; }
    .group-header .label { font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--muted); }

    /* ── COVERAGE CHIPS ── */
    .chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .chip { padding: 4px 8px; border-radius: 20px; font-size: 11px; font-weight: 600;
      border: 1px solid var(--line); background: var(--bg2); }
    .chip.c-green { border-color: var(--green); color: var(--green); }
    .chip.c-yellow { border-color: var(--accent-2); color: var(--accent-2); }
    .chip.c-red { border-color: var(--red); color: var(--red); }

    /* ── GAP HINTS ── */
    .gap-card { background: linear-gradient(135deg, rgba(239,68,68,0.06), rgba(239,68,68,0.02));
      border: 1px solid rgba(239,68,68,0.2); border-radius: var(--radius-sm);
      padding: 10px 12px; margin-bottom: 8px; }
    .gap-card .gap-title { font-weight: 700; font-size: 13px; color: var(--orange); }
    .gap-card .gap-exercises { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .gap-card .gap-exercises span { color: var(--accent); cursor: pointer; font-weight: 600; }
    .gap-card .gap-exercises span:hover { text-decoration: underline; }

    /* ── MUSCLE POPUP ── */
    .popup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 199; }
    .muscle-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      background: var(--panel); border: 1px solid var(--accent); border-radius: var(--radius);
      padding: 20px; max-width: 340px; width: 90%; z-index: 200;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(94,234,212,0.1); }
    .muscle-popup h3 { margin-bottom: 10px; color: var(--accent); }
    .muscle-popup .close-btn { position: absolute; top: 10px; right: 14px; background: none;
      border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 4px; }
    .muscle-popup .close-btn:hover { color: var(--ink); }
    .popup-ex-item { display: flex; justify-content: space-between; align-items: center;
      padding: 8px 10px; background: var(--bg2); border: 1px solid var(--line);
      border-radius: var(--radius-sm); margin-bottom: 6px; font-size: 13px; cursor: pointer; }
    .popup-ex-item:hover { border-color: var(--accent); }
    .popup-ex-item .rel { font-size: 10px; font-weight: 700; text-transform: uppercase; }
    .popup-ex-item .rel.primary { color: var(--green); }
    .popup-ex-item .rel.secondary { color: var(--muted); }

    /* ── JOURNAL ── */
    .j-list { display: grid; gap: 6px; max-height: 220px; overflow-y: auto; }
    .j-item { display: flex; justify-content: space-between; align-items: center;
      padding: 8px 10px; background: var(--bg2); border: 1px solid var(--line);
      border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; transition: border-color 100ms; }
    .j-item:hover { border-color: var(--accent); }
    .j-item small { color: var(--muted); }

    /* ── SESSION LOG ── */
    .session-log { display: grid; gap: 6px; }
    .slog-item { display: flex; justify-content: space-between; align-items: center;
      padding: 10px 12px; background: var(--bg2); border: 1px solid var(--line);
      border-radius: var(--radius-sm); }
    .slog-item .title { font-weight: 700; font-size: 13px; }
    .slog-item .meta { color: var(--muted); font-size: 12px; }
    .slog-item .block-tag { padding: 3px 8px; border-radius: 20px; font-size: 11px;
      font-weight: 700; background: var(--accent-glow); color: var(--accent);
      border: 1px solid rgba(94,234,212,0.2); }

    /* ── PLAN HINT ── */
    .plan-hint { padding: 8px 12px; background: var(--accent-glow);
      border: 1px solid rgba(94,234,212,0.15); border-radius: var(--radius-sm);
      font-size: 12px; color: var(--accent); margin-bottom: 10px; }

    /* ── BUTTONS / FORMS ── */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 16px; border-radius: var(--radius-sm); font: 13px var(--font);
      font-weight: 700; cursor: pointer; border: none; transition: all 140ms; }
    .btn-primary { background: linear-gradient(135deg, #22d3ee, #14b8a6); color: #062026; }
    .btn-primary:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .btn-secondary { background: var(--card); border: 1px solid var(--line); color: var(--ink); }
    .btn-secondary:hover { border-color: var(--accent); }
    .btn-sm { padding: 6px 10px; font-size: 12px; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    input[type=date], textarea, select {
      width: 100%; padding: 10px 12px; background: var(--bg2); border: 1px solid var(--line);
      border-radius: var(--radius-sm); color: var(--ink); font: 14px var(--font);
      transition: border-color 120ms; }
    input[type=date]:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
    textarea { min-height: 100px; resize: vertical; }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: calc(80px + var(--safe-bottom)); left: 50%;
      transform: translateX(-50%) translateY(20px); background: var(--panel); color: var(--ink);
      padding: 10px 16px; border-radius: var(--radius-sm); border: 1px solid var(--accent);
      box-shadow: 0 0 30px rgba(94,234,212,0.15); font-size: 13px; font-weight: 600;
      opacity: 0; pointer-events: none; transition: all 200ms; z-index: 100; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── UTILS ── */
    .muted { color: var(--muted); } .text-sm { font-size: 12px; } .text-xs { font-size: 11px; }
    .mt-8 { margin-top: 8px; } .mt-12 { margin-top: 12px; } .mb-8 { margin-bottom: 8px; }
    .hidden { display: none !important; }
    .fade-in { animation: fadeIn 200ms ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .loading { animation: pulse 1.2s infinite; }

    /* ── SESSION V2 ── */
    .sess-section {
      display: flex; align-items: center; gap: 10px; margin: 22px 0 10px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--dim);
    }
    .sess-section::after { content: ''; flex: 1; height: 1px; background: var(--line); }
    .sess-header-row { display: flex; gap: 8px; align-items: center; }
    .sess-header-row input[type=date] { width: auto; flex: 1; font-size: 15px; font-weight: 600; }
    .sess-save { padding: 11px 22px; font-size: 13px; font-weight: 800; letter-spacing: 0.05em; }
    .ex-cards { display: grid; gap: 10px; }
    .ex-card {
      background: var(--card); border: 1px solid var(--line);
      border-left: 3px solid var(--accent); border-radius: var(--radius);
      padding: 14px 14px 12px; position: relative;
      transition: border-color 150ms, box-shadow 150ms;
    }
    .ex-card:focus-within {
      border-color: rgba(94,234,212,0.4);
      box-shadow: 0 0 0 1px rgba(94,234,212,0.1), 0 4px 20px rgba(0,0,0,0.25);
    }
    .ex-card-name {
      font-weight: 700; font-size: 14px; margin-bottom: 14px;
      padding-right: 30px; letter-spacing: -0.01em; line-height: 1.3;
    }
    .ex-metrics {
      display: grid; grid-template-columns: 1fr 18px 1fr 18px 1fr;
      align-items: center; gap: 6px; margin-bottom: 10px;
    }
    .ex-metric { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .ex-metric-num {
      width: 100%; text-align: center; font-family: var(--mono);
      font-size: 28px; font-weight: 800; padding: 8px 4px;
      background: var(--bg2); border: 1px solid var(--line);
      border-radius: var(--radius-sm); color: var(--ink);
      letter-spacing: -0.03em; transition: border-color 120ms;
      -webkit-appearance: none; appearance: none;
    }
    .ex-metric-num:focus { outline: none; border-color: var(--accent); }
    .ex-metric-num:disabled { opacity: 0.2; background: transparent; border-color: transparent; }
    .ex-metric-label {
      font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--dim);
    }
    .ex-sep { font-size: 15px; color: var(--dim); text-align: center; font-weight: 300; }
    .ex-card-footer { display: flex; align-items: center; gap: 6px; }
    .ex-note-inp {
      flex: 1; padding: 7px 10px; background: var(--bg2);
      border: 1px solid var(--line); border-radius: var(--radius-xs);
      color: var(--muted); font: 12px var(--font); transition: all 120ms;
    }
    .ex-note-inp::placeholder { color: var(--dim); }
    .ex-note-inp:focus { outline: none; border-color: var(--accent); color: var(--ink); }
    .ex-hit-toggle {
      padding: 6px 9px; border: 1px solid var(--line); border-radius: var(--radius-xs);
      background: var(--bg2); cursor: pointer; font: 700 10px var(--font);
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--dim);
      transition: all 120ms; white-space: nowrap; flex-shrink: 0;
    }
    .ex-hit-toggle.active {
      color: var(--accent-2); border-color: rgba(245,158,11,0.5);
      background: rgba(245,158,11,0.08);
    }
    .ex-card-del {
      position: absolute; top: 10px; right: 10px; background: none; border: none;
      color: var(--dim); cursor: pointer; font-size: 18px; padding: 4px 6px;
      border-radius: var(--radius-xs); line-height: 1; transition: all 120ms;
    }
    .ex-card-del:hover { color: var(--red); background: rgba(239,68,68,0.1); }
    .ex-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 36px 16px; text-align: center;
      border: 2px dashed var(--line); border-radius: var(--radius);
    }
    .ex-empty svg { opacity: 0.25; margin-bottom: 12px; }
    .ex-empty p { font-size: 13px; color: var(--dim); font-weight: 600; }
    .add-ex-box {
      background: var(--bg2); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 12px; margin-top: 10px;
    }
    .sess-quality-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; }
    .effort-val { font-family: var(--mono); font-size: 22px; font-weight: 800; min-width: 26px; color: var(--accent); }
  </style>
</head>
<body>
<div id="app">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">

      </svg>
      <span>Fitness</span>
    </div>
    <div class="topbar-actions">
      <button id="installBtn" class="hidden">Install</button>

    </div>
  </div>

  <!-- VIEWS -->
  <div class="view-container">

    <!-- ══ DASHBOARD ══ -->
    <div class="view active" id="view-dash">

        <div class="hero-grid">

            <svg viewBox="0 0 120 120">
              <defs>

                  <stop offset="100%" stop-color="#14b8a6"/>

              </defs>

              <circle class="fg-ring" cx="60" cy="60" r="54" id="heroRing"/>
            </svg>
            <div class="ring-label">
              <div class="pct" id="heroPct">0%</div>
              <div class="sub">HEUTE</div>
            </div>
          </div>
          <div class="stat-row">
            <div class="stat-pill">

            </div>
          </div>
        </div>
      </div>

      <div class="card fade-in">
        <h3>Diese Woche</h3>

      </div>

      <div class="card fade-in">
        <h3>Workout-Block</h3>

      <div class="card fade-in">
        <h3>Coverage (7 Tage)</h3>
        <div class="chips" id="coverageChips"></div>
      </div>
    </div>

    <!-- ══ SESSION ══ -->
    <div class="view" id="view-session">

      <!-- Datum + Speichern -->
      <div class="sess-header-row">
        <input type="date" id="sessDate" />
        <button class="btn btn-primary sess-save" id="sessSave">Speichern</button>
      </div>

      <!-- Split -->
      <div class="sess-section">Split</div>
      <div class="block-grid" id="sessBlockGrid"></div>
      <div class="plan-hint hidden mt-8" id="sessPlanHint"></div>

      <!-- Muskelgruppen-Filter -->
      <div class="muscle-filter-badge hidden mt-8" id="muscleGroupFilter">
        Muskelgruppe: <strong id="muscleGroupFilterName"></strong>

      <!-- Übungen -->
      <div class="sess-section">Übungen</div>
      <div class="ex-cards" id="exRows"></div>

      <!-- Übung hinzufügen -->
      <div class="add-ex-box">
        <div class="search-wrap mb-8">
          <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="wgerSearch" placeholder="Übung suchen…" autocomplete="off" />
          <div class="search-spinner" id="wgerSpinner"></div>
          <div class="search-results" id="wgerResults"></div>
        </div>
        <div class="quick-row">
          <input type="text" id="quickInput" placeholder="bench 3x8@80 rpe7" />
          <button class="btn btn-secondary btn-sm" id="quickParse">+</button>

        <div class="btn-row mt-8">
          <button class="btn btn-secondary btn-sm" id="addExRow">+ Zeile</button>

      <!-- Intensität + Notizen -->
      <div class="sess-section">Qualität</div>

      <!-- Gap Hints -->
      <div class="card hidden" id="gapHints"></div>

    <!-- ══ JOURNAL ══ -->
    <div class="view" id="view-journal">
      <div class="card">
        <h2>Journal</h2>
        <div class="row mb-8">
          <input type="date" id="jDate" style="flex:1;" />
          <button class="btn btn-primary" id="jSave">Speichern</button>
        </div>
        <textarea id="jText" placeholder="Training, Notizen, Learnings…"></textarea>
        <div class="muted text-xs mt-8" id="jStatus"></div>
      </div>
      <div class="card">
        <h3>Einträge</h3>
        <div class="j-list" id="jList"></div>
      </div>
    </div>

    <!-- ══ MUSCLES ══ -->
    <div class="view" id="view-muscles">
      <div class="card">
        <h2>Muscle Coverage</h2>
        <div class="row mb-8">
          <select id="coverageDays" style="width:auto;">
            <option value="7" selected>7 Tage</option>
            <option value="14">14 Tage</option>
            <option value="28">28 Tage</option>
          </select>
          <button class="btn btn-secondary btn-sm" id="refreshCoverage">Refresh</button>
        </div>
        <div class="bodymap-container" id="bodymapBox">
          <div class="bodymap-toggle">
            <button class="active" id="btnFront">Anterior</button>
            <button id="btnBack">Posterior</button>
          </div>
          <div id="bodymapChart"></div>
        </div>
      </div>
      <div class="card">
        <h3>Muskel-Detail</h3>
        <div id="muscleDetail"></div>
      </div>
    </div>

  </div><!-- /view-container -->

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-view="dash">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/>
        <rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/>
      </svg>
      <span>Dash</span>
    </button>
    <button class="nav-item" data-view="session">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M6.5 6.5h11M6.5 12h11M6.5 17.5h7"/><rect x="3" y="2" width="18" height="20" rx="2"/>
      </svg>
      <span>Session</span>
    </button>
    <button class="nav-item" data-view="journal">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
      <span>Journal</span>
    </button>
    <button class="nav-item" data-view="muscles">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M12 2c1 3 4 5 4 8a4 4 0 01-8 0c0-3 3-5 4-8z"/><path d="M12 14v8"/><path d="M9 18h6"/>
      </svg>
      <span>Muscles</span>
    </button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script type="module">
// ── Core ──────────────────────────────────────────────────────────────────────
const API = location.origin;

// Lokales Datum (kein UTC-Drift)
function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];

const state = {
  blocks: [],
  session: { exercises: [], block: "", effort: 5, mood: "" },
  selectedMuscleGroup: null,
};

// ── Toast ──
let _toastT;
function toast(msg) {
  const el = $("#toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(_toastT);
  _toastT = setTimeout(() => el.classList.remove("show"), 2000);
}

// ── API ──
async function api(path, opts) {
  const r = await fetch(API + path, opts);
  return r.json();
}

// ── Nav ──
const views = $$(".view"), navItems = $$(".nav-item");
function switchView(name) {
  views.forEach(v => v.classList.toggle("active", v.id === `view-${name}`));
  navItems.forEach(n => n.classList.toggle("active", n.dataset.view === name));
  $(".view-container").scrollTop = 0;
}
navItems.forEach(n => n.addEventListener("click", () => {
  switchView(n.dataset.view);
  if (n.dataset.view === "muscles" && !_bodyChart) loadMuscleCoverage(Number($("#coverageDays").value));
}));

// ── Theme ──
const THEMES = ["mocha","latte"];
function applyTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
  localStorage.setItem("fitness-theme", t);
  $('meta[name="theme-color"]').content = t === "latte" ? "#f5f0e8" : "#0a0d14";
}
(async () => {
  const saved = localStorage.getItem("fitness-theme");
  try { const r = await api("/theme"); applyTheme(saved || r.theme || "mocha"); }
  catch { applyTheme(saved || "mocha"); }
})();
$("#themeBtn").onclick = () => {
  const cur = document.documentElement.getAttribute("data-theme") || "mocha";
  const next = cur === "mocha" ? "latte" : "mocha";
  applyTheme(next);
  fetch(API + "/theme", { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({theme:next}) }).catch(()=>{});
};

// ── PWA Install ──
let _pwa = null;
window.addEventListener("beforeinstallprompt", e => { e.preventDefault(); _pwa = e; $("#installBtn").classList.remove("hidden"); });
$("#installBtn").onclick = async () => {
  if (!_pwa) return;
  _pwa.prompt();
  const { outcome } = await _pwa.userChoice;
  if (outcome === "accepted") toast("Installiert!");
  _pwa = null; $("#installBtn").classList.add("hidden");
};

// ═══════════════════════════════════════════════════════════════════════════
// WGER LIVE SEARCH
// ═══════════════════════════════════════════════════════════════════════════
let _searchTimer;
function setupWgerSearch() {
  const input   = $("#wgerSearch");
  const results = $("#wgerResults");
  const spinner = $("#wgerSpinner");

  input.addEventListener("input", () => {
    clearTimeout(_searchTimer);
    const q = input.value.trim();
    if (q.length < 2) { results.classList.remove("open"); return; }
    spinner.classList.add("active");
    _searchTimer = setTimeout(async () => {
      try {
        const data = await api(`/exercises/search?q=${encodeURIComponent(q)}&limit=12`);
        renderSearchResults(data.results || []);
      } catch { renderSearchResults([]); }
      spinner.classList.remove("active");
    }, 350);
  });

  input.addEventListener("focus", () => {
    if (results.children.length) results.classList.add("open");
  });

  document.addEventListener("click", e => {
    if (!e.target.closest(".search-wrap")) results.classList.remove("open");
  });
}

function renderSearchResults(items) {
  const el = $("#wgerResults");
  el.innerHTML = "";
  if (!items.length) { el.classList.remove("open"); return; }

  // Filter by muscle group if active
  const filtered = state.selectedMuscleGroup
    ? items.filter(ex => (ex.primaryMuscles || []).some(m => m.toLowerCase().includes(state.selectedMuscleGroup)))
    : items;

  (filtered.length ? filtered : items).forEach(ex => {
    const div = document.createElement("div");
    div.className = "search-item";
    const muscles = [...(ex.primaryMuscles||[]).slice(0,2), ...(ex.secondaryMuscles||[]).slice(0,1)].join(", ");
    div.innerHTML = `<div class="si-name">${ex.name}</div>${muscles ? `<div class="si-meta">${muscles}</div>` : ""}`;
    div.addEventListener("mousedown", e => {
      e.preventDefault();
      addExToSession(ex);
      $("#wgerSearch").value = "";
      el.classList.remove("open");
      toast(`+ ${ex.name}`);
    });
    el.appendChild(div);
  });
  el.classList.add("open");
}

function addExToSession(ex) {
  state.session.exercises.push({
    name: ex.name, id: ex.id || "",
    primaryMuscles: ex.primaryMuscles || [],
    secondaryMuscles: ex.secondaryMuscles || [],
    sets: "", reps: "", weight: "", note: "", isHIT: false,
  });
  renderExTable();
}

// Muscle group filter
$("#clearMuscleFilter").onclick = () => {
  state.selectedMuscleGroup = null;
  updateMuscleFilterBadge();
};
function updateMuscleFilterBadge() {
  if (state.selectedMuscleGroup) {
    $("#muscleGroupFilterName").textContent = state.selectedMuscleGroup;
    $("#muscleGroupFilter").classList.remove("hidden");
  } else {
    $("#muscleGroupFilter").classList.add("hidden");
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// QUICK PARSE  "bench 3x8@80 rpe7"
// ═══════════════════════════════════════════════════════════════════════════
function parseQuick(raw) {
  const parts = raw.trim().split(/\s+/);
  let name = "", sets = "", reps = "", weight = "", rpe = "";
  for (const p of parts) {
    const full   = p.match(/^(\d+)x(\d+)@([\d.,]+)$/i);
    const setRep = p.match(/^(\d+)x(\d+)$/i);
    const wgt    = p.match(/^@([\d.,]+)/);
    const r      = p.match(/^rpe\s*([\d.]+)$/i);
    if (full)   { sets = full[1]; reps = full[2]; weight = full[3].replace(",","."); }
    else if (setRep) { sets = setRep[1]; reps = setRep[2]; }
    else if (wgt)    { weight = wgt[1].replace(",","."); }
    else if (r)      { rpe = r[1]; }
    else if (!name)  { name = p; }
    else             { name += " " + p; }
  }
  return { name, sets, reps, weight, note: rpe ? `RPE ${rpe}` : "", isHIT: false, primaryMuscles: [], secondaryMuscles: [] };
}
$("#quickParse").onclick = () => {
  const raw = $("#quickInput").value.trim();
  if (!raw) return;
  const ex = parseQuick(raw);
  state.session.exercises.push(ex);
  renderExTable();
  $("#quickInput").value = "";
  toast("+ " + (ex.name || "Übung"));
};
$("#quickInput").addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); $("#quickParse").click(); } });

// ═══════════════════════════════════════════════════════════════════════════
// BLOCK SELECTOR
// ═══════════════════════════════════════════════════════════════════════════
function renderBlockGrid(targetId, onSelect) {
  const el = $(targetId);
  el.innerHTML = "";
  state.blocks.forEach(b => {
    const btn = document.createElement("button");
    btn.className = "block-btn" + (state.session.block === b.id ? " active" : "");
    btn.innerHTML = `<div class="name">${b.label}</div>`;
    btn.onclick = () => {
      state.session.block = b.id;
      $$(".block-btn").forEach(x => x.classList.remove("active"));
      $$(`[data-block="${b.id}"]`).forEach(x => x.classList.add("active"));
      btn.classList.add("active");
      updateHeroRing();
      if (onSelect) onSelect(b);
    };
    btn.dataset.block = b.id;
    el.appendChild(btn);
  });
}

function highlightActiveBlock() {
  $$(".block-btn").forEach(b => b.classList.toggle("active", b.dataset.block === state.session.block));
}

// ═══════════════════════════════════════════════════════════════════════════
// EXERCISE TABLE
// ═══════════════════════════════════════════════════════════════════════════
function renderExTable() {
  const container = $("#exRows");
  container.innerHTML = "";

  if (!state.session.exercises.length) {
    container.innerHTML = `<div class="ex-empty">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M6.5 6.5h11M6.5 12h8M6.5 17.5h5"/><rect x="3" y="2" width="18" height="20" rx="2"/>
      </svg>
      <p>Noch keine Übungen — suche oben oder tippe einen Kurzbefehl</p>
    </div>`;
    return;
  }

  state.session.exercises.forEach((ex, idx) => {
    const card = document.createElement("div");
    card.className = "ex-card";

    // Name
    const nameEl = document.createElement("div");
    nameEl.className = "ex-card-name";
    if (ex.name) {
      nameEl.textContent = ex.name;
    } else {
      const ph = document.createElement("span");
      ph.style.cssText = "color:var(--dim);font-style:italic;font-weight:400";
      ph.textContent = "Übung";
      nameEl.appendChild(ph);
    }
    card.appendChild(nameEl);

    // Delete
    const delBtn = document.createElement("button");
    delBtn.className = "ex-card-del";
    delBtn.type = "button";
    delBtn.textContent = "×";
    delBtn.addEventListener("click", () => { state.session.exercises.splice(idx, 1); renderExTable(); });
    card.appendChild(delBtn);

    // Metrics: Sätze × Wdhl @ kg
    const metricsEl = document.createElement("div");
    metricsEl.className = "ex-metrics";
    const defs = [
      { key: "sets",   label: "Sätze", mode: "numeric" },
      { sep: "×" },
      { key: "reps",   label: "Wdhl",  mode: "numeric" },
      { sep: "@" },
      { key: "weight", label: "kg",    mode: "decimal" },
    ];
    defs.forEach(def => {
      if (def.sep) {
        const s = document.createElement("div");
        s.className = "ex-sep"; s.textContent = def.sep;
        metricsEl.appendChild(s); return;
      }
      const { key, label, mode } = def;
      const m = document.createElement("div");
      m.className = "ex-metric";
      const inp = document.createElement("input");
      inp.className = "ex-metric-num";
      inp.type = "text"; inp.inputMode = mode; inp.placeholder = "—";
      inp.value = ex[key] || "";
      if (ex.isHIT && (key === "sets" || key === "reps")) inp.disabled = true;
      inp.addEventListener("input", e => { state.session.exercises[idx][key] = e.target.value; });
      const lbl = document.createElement("div");
      lbl.className = "ex-metric-label"; lbl.textContent = label;
      m.appendChild(inp); m.appendChild(lbl);
      metricsEl.appendChild(m);
    });
    card.appendChild(metricsEl);

    // Footer: Notiz + HIT-Toggle
    const footer = document.createElement("div");
    footer.className = "ex-card-footer";

    const noteInp = document.createElement("input");
    noteInp.className = "ex-note-inp";
    noteInp.type = "text"; noteInp.placeholder = "Notiz, RPE…";
    noteInp.value = ex.note || "";
    noteInp.addEventListener("input", e => { state.session.exercises[idx].note = e.target.value; });

    const hitBtn = document.createElement("button");
    hitBtn.className = "ex-hit-toggle" + (ex.isHIT ? " active" : "");
    hitBtn.type = "button"; hitBtn.textContent = "HIT";
    hitBtn.addEventListener("click", () => {
      state.session.exercises[idx].isHIT = !state.session.exercises[idx].isHIT;
      renderExTable();
    });

    footer.appendChild(noteInp);
    footer.appendChild(hitBtn);
    card.appendChild(footer);
    container.appendChild(card);
  });
}
$("#addExRow").onclick = () => {
  state.session.exercises.push({ name: "", sets: "", reps: "", weight: "", note: "", isHIT: false });
  renderExTable();
};

// Effort + Mood
const MOODS = ["🔥","😊","😐","🤕","🤢"];
function renderMoods() {
  const el = $("#sessMoods");
  el.innerHTML = "";
  MOODS.forEach(m => {
    const btn = document.createElement("button");
    btn.type = "button"; btn.className = "mood-btn";
    if (state.session.mood === m) btn.classList.add("active");
    btn.textContent = m;
    btn.onclick = () => { state.session.mood = m; renderMoods(); };
    el.appendChild(btn);
  });
}
$("#sessEffort").oninput = e => { state.session.effort = Number(e.target.value); $("#sessEffortLabel").textContent = e.target.value; };

// ═══════════════════════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════
function updateHeroRing() {
  const pct = state.session.block ? 1 : 0;
  const c   = 2 * Math.PI * 54; // r=54
  $("#heroRing").style.strokeDashoffset = (c * (1 - pct)).toFixed(1);
  $("#heroPct").textContent = pct ? "100%" : "0%";
}

async function loadDashboard() {
  const d = today();
  $("#heroDate").textContent = d;
  $("#sessDate").value = d;
  $("#jDate").value = d;

  try {
    const r = await api("/blocks");
    state.blocks = r.blocks || [];
  } catch {
    state.blocks = [
      { id:"push",  label:"Push" }, { id:"pull",  label:"Pull" },
      { id:"legs",  label:"Legs" }, { id:"upper", label:"Upper" }, { id:"lower", label:"Lower" },
    ];
  }

  renderBlockGrid("#blockGrid");
  renderBlockGrid("#sessBlockGrid", () => { renderExTable(); });

  await loadSession(d);
  await loadPlanHint(d);
  await loadWeekHeatmap();
  await loadCoverageChips();
  await loadJournal(d);
  await listJournalEntries();
}

async function loadSession(date) {
  try {
    const r = await api(`/session?date=${date}`);
    if (r.ok && r.data) {
      state.session = { ...state.session, ...r.data, exercises: r.data.exercises || [] };
    } else {
      state.session = { exercises: [], block: "", effort: 5, mood: "" };
    }
  } catch {
    state.session = { exercises: [], block: "", effort: 5, mood: "" };
  }
  renderExTable();
  renderMoods();
  highlightActiveBlock();
  updateHeroRing();
  if (state.session.notes) $("#sessNotes").value = state.session.notes;
  if (state.session.effort) { $("#sessEffort").value = state.session.effort; $("#sessEffortLabel").textContent = state.session.effort; }
}

async function loadPlanHint(date) {
  try {
    const r = await api(`/plan/today?date=${date}`);
    if (r.suggestion) {
      const hint = `${r.suggestion.day}: ${r.suggestion.block} — ${(r.suggestion.exercises||[]).slice(0,4).join(", ")}`;
      for (const id of ["planHint","sessPlanHint"]) {
        $(``+ "#" + id).textContent = hint;
        $(``+ "#" + id).classList.remove("hidden");
      }
    }
  } catch {}
}

async function loadWeekHeatmap() {
  const el = $("#weekHeatmap");
  el.innerHTML = "";
  const DAY_NAMES = ["Mo","Di","Mi","Do","Fr","Sa","So"];
  const todayStr  = today();
  const d0 = new Date(todayStr + "T12:00:00");
  const off = (d0.getDay() + 6) % 7;
  d0.setDate(d0.getDate() - off);

  let weekScore = 0;
  const logItems = [];

  for (let i = 0; i < 7; i++) {
    const d = new Date(d0); d.setDate(d0.getDate() + i);
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    const isToday = ds === todayStr;
    let block = "";
    try { const r = await fetch(API + `/session?date=${ds}`); if (r.ok) { const j = await r.json(); block = j.data?.block || ""; } } catch {}
    if (block) { weekScore++; logItems.push({ date: ds, block }); }
    const cell = document.createElement("div");
    cell.className = "heatmap-cell" + (block ? " hit" : "") + (isToday ? " today" : "");
    cell.innerHTML = `<div class="day-label">${DAY_NAMES[i]}</div><div>${block ? block.slice(0,4).toUpperCase() : "—"}</div>`;
    el.appendChild(cell);
  }

  $("#heroWeekScore").textContent = weekScore;
  const logEl = $("#recentLog");
  logEl.innerHTML = "";
  if (!logItems.length) { logEl.innerHTML = `<div class="muted text-sm">Noch keine Sessions diese Woche</div>`; return; }
  logItems.reverse().forEach(item => {
    const div = document.createElement("div");
    div.className = "slog-item";
    div.innerHTML = `<div><div class="title">${item.date}</div></div><div class="block-tag">${item.block}</div>`;
    logEl.appendChild(div);
  });
}

async function loadCoverageChips() {
  const el = $("#coverageChips");
  el.innerHTML = "";
  try {
    const r = await api("/coverage/detailed?days=7");
    const muscles = (r.muscles || []).filter(m => m.totalScore > 0).sort((a,b) => b.totalScore - a.totalScore);
    if (!muscles.length) { el.innerHTML = `<div class="chip">Noch keine Coverage</div>`; return; }
    muscles.forEach(m => {
      const chip = document.createElement("div");
      chip.className = "chip " + (m.totalScore >= 3 ? "c-green" : m.totalScore >= 1 ? "c-yellow" : "c-red");
      chip.textContent = `${m.name_en} (${m.totalScore})`;
      el.appendChild(chip);
    });
  } catch { el.innerHTML = `<div class="chip">—</div>`; }
}

// SESSION SAVE
// ═══════════════════════════════════════════════════════════════════════════
async function saveSession() {
  const date = $("#sessDate").value;
  if (!date) { toast("Kein Datum"); return; }
  await api("/session", {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({
      date, block: state.session.block, exercises: state.session.exercises,
      effort: state.session.effort, mood: state.session.mood,
      notes: $("#sessNotes").value,
    }),
  });
  toast("Session gespeichert!");
  $("#sessStatus").textContent = `Gespeichert ${new Date().toLocaleTimeString()}`;
  updateHeroRing();
  await loadWeekHeatmap();
  await loadCoverageChips();
  showGapHints();
}
$("#sessSave").onclick = saveSession;

$("#sessDate").onchange = async e => {
  await loadSession(e.target.value);
  await loadPlanHint(e.target.value);
};

$("#loadLastSession").onclick = async () => {
  try {
    const r = await api("/session/latest");
    if (!r.session?.data) { toast("Keine vorherige Session"); return; }
    state.session.exercises = r.session.data.exercises || [];
    state.session.block = r.session.data.block || "";
    renderExTable();
    highlightActiveBlock();
    toast("Letzte Session geladen");
  } catch { toast("Fehler beim Laden"); }
};

async function showGapHints() {
  const el = $("#gapHints");
  try {
    const r = await api("/coverage/gaps?days=7");
    const gaps = r.gaps || [];
    if (!gaps.length) { el.classList.add("hidden"); return; }
    el.innerHTML = `<h3>Coverage-Lücken</h3>`;
    gaps.forEach(gap => {
      const card = document.createElement("div");
      card.className = "gap-card";
      card.innerHTML = `<div class="gap-title">${gap.name} (${gap.hits} Hits)</div>`;
      el.appendChild(card);
    });
    el.classList.remove("hidden");
  } catch { el.classList.add("hidden"); }
}

async function loadJournal(date) {
  try {
    const r = await fetch(API + `/journal?date=${date}`);
    if (r.ok) { const j = await r.json(); $("#jText").value = j.content || ""; $("#jStatus").textContent = j.mtime || ""; }
    else { $("#jText").value = ""; $("#jStatus").textContent = "Neu"; }
  } catch { $("#jText").value = ""; }
}
async function listJournalEntries() {
  try {
    const r = await api("/journal/list");
    const el = $("#jList"); el.innerHTML = "";
    (r.entries || []).forEach(item => {
      const div = document.createElement("div");
      div.className = "j-item";
      div.innerHTML = `<span>${item.date}</span><small>${(item.mtime||"").slice(0,10)}</small>`;
      div.onclick = () => { $("#jDate").value = item.date; loadJournal(item.date); };
      el.appendChild(div);
    });
  } catch {}
}
$("#jSave").onclick = async () => {
  const date = $("#jDate").value;
  await api("/journal", { method:"POST", headers:{"content-type":"application/json"},
    body: JSON.stringify({ date, content: $("#jText").value }) });
  toast("Journal gespeichert");
  await listJournalEntries();
};
$("#jDate").onchange = e => loadJournal(e.target.value);

// ═══════════════════════════════════════════════════════════════════════════
// MUSCLE COVERAGE VIEW
// ═══════════════════════════════════════════════════════════════════════════
const MGROUP_COLORS = {
  chest:"#ef4444", back:"#3b82f6", shoulders:"#f59e0b", arms:"#a78bfa",
  core:"#22c55e", glutes:"#ec4899", quads:"#f97316", hamstrings:"#06b6d4", calves:"#8b5cf6",
};

// Mapping: interne Gruppen → body-muscles slugs (Auswahl der relevantesten)
const GROUP_TO_SLUGS = {
  chest:      ["pectoralis-major-left","pectoralis-major-right","pectoralis-minor-left","pectoralis-minor-right"],
  back:       ["latissimus-dorsi-left","latissimus-dorsi-right","rhomboids","teres-major-left","teres-major-right","erector-spinae"],
  shoulders:  ["anterior-deltoid-left","anterior-deltoid-right","lateral-deltoid-left","lateral-deltoid-right","posterior-deltoid-left","posterior-deltoid-right"],
  arms:       ["biceps-brachii-left","biceps-brachii-right","triceps-brachii-long-left","triceps-brachii-long-right","brachialis-left","brachialis-right"],
  core:       ["rectus-abdominis","external-oblique-left","external-oblique-right","transverse-abdominis"],
  glutes:     ["gluteus-maximus-left","gluteus-maximus-right","gluteus-medius-left","gluteus-medius-right"],
  quads:      ["rectus-femoris-left","rectus-femoris-right","vastus-lateralis-left","vastus-lateralis-right","vastus-medialis-left","vastus-medialis-right"],
  hamstrings: ["biceps-femoris-left","biceps-femoris-right","semimembranosus-left","semimembranosus-right","semitendinosus-left","semitendinosus-right"],
  calves:     ["gastrocnemius-left","gastrocnemius-right","soleus-left","soleus-right"],
};

let _bodyChart = null;
let _bodyState = {};
let _bodySide  = "FRONT";

function initBodyChart() {
  const el = $("#bodymapChart");
  if (_bodyChart) { _bodyChart.destroy(); _bodyChart = null; }
  _bodyChart = new BodyMuscles.BodyChart(el, {
    view: _bodySide,
    bodyState: _bodyState,
    onMuscleClick(slug, name) {
      // Gruppen-Zuordnung rückwärts
      const group = Object.entries(GROUP_TO_SLUGS).find(([, slugs]) => slugs.includes(slug))?.[0];
      showMusclePopup(group || slug, name);
    },
  });
}

function applyBodyState() {
  if (_bodyChart) _bodyChart.update({ view: _bodySide, bodyState: _bodyState });
}

// Front/Back Toggle
$("#btnFront").onclick = () => {
  _bodySide = "FRONT";
  $("#btnFront").classList.add("active"); $("#btnBack").classList.remove("active");
  applyBodyState();
};
$("#btnBack").onclick = () => {
  _bodySide = "BACK";
  $("#btnBack").classList.add("active"); $("#btnFront").classList.remove("active");
  applyBodyState();
};

async function showMusclePopup(groupId, muscleName) {
  state.selectedMuscleGroup = groupId;
  updateMuscleFilterBadge();
  $$(".popup-overlay, .muscle-popup").forEach(el => el.remove());

  const r = await api(`/exercises/by-group?group=${groupId}`).catch(() => ({ exercises: [] }));
  const exercises = r.exercises || [];

  const overlay = document.createElement("div");
  overlay.className = "popup-overlay";

  const popup = document.createElement("div");
  popup.className = "muscle-popup";
  popup.innerHTML = `<button class="close-btn">×</button><h3>${muscleName || groupId}</h3>`;
  popup.querySelector(".close-btn").onclick = () => { overlay.remove(); popup.remove(); };
  overlay.onclick = () => { overlay.remove(); popup.remove(); };

  if (!exercises.length) {
    popup.innerHTML += `<div class="muted text-sm">Suche nach "${groupId}" im Session-Tab</div>`;
  } else {
    exercises.slice(0, 8).forEach(ex => {
      const item = document.createElement("div");
      item.className = "popup-ex-item";
      item.innerHTML = `<span>${ex.name_en}</span><span class="rel ${ex.relevance||"primary"}">${ex.relevance||"P"}</span>`;
      item.onclick = () => {
        addExToSession({ name: ex.name_en, id: ex.id || "", primaryMuscles: [groupId], secondaryMuscles: [] });
        toast(`+ ${ex.name_en}`);
        overlay.remove(); popup.remove();
        switchView("session");
      };
      popup.appendChild(item);
    });
  }

  document.body.appendChild(overlay);
  document.body.appendChild(popup);
}

async function loadMuscleCoverage(days = 7) {
  if (!_bodyChart) initBodyChart();

  try {
    const r = await api(`/coverage/detailed?days=${days}`);
    const groups = r.groups || [];

    const groupScores = {};
    for (const g of groups) {
      const total = g.muscles.reduce((s, m) => s + m.totalScore, 0);
      groupScores[g.id] = { score: total, avg: Math.round((total / Math.max(g.muscles.length,1)) * 10) / 10, muscles: g.muscles };
    }

    // Coverage → body-muscles intensity (0–10)
    _bodyState = {};
    for (const [group, slugs] of Object.entries(GROUP_TO_SLUGS)) {
      const gs = groupScores[group];
      if (!gs || gs.avg <= 0) continue;
      const intensity = Math.min(10, Math.round(gs.avg * 2.5)); // avg 4 → intensity 10
      for (const slug of slugs) {
        _bodyState[slug] = { intensity, selected: false };
      }
    }
    applyBodyState();

    // Detail-Liste
    const detail = $("#muscleDetail");
    detail.innerHTML = "";
    for (const gid of ["chest","back","shoulders","arms","core","glutes","quads","hamstrings","calves"]) {
      const gs = groupScores[gid];
      if (!gs) continue;
      const hdr = document.createElement("div");
      hdr.className = "group-header";
      hdr.innerHTML = `<div class="dot" style="background:${MGROUP_COLORS[gid]||"var(--accent)"}"></div><div class="label">${gid} (Ø ${gs.avg})</div>`;
      detail.appendChild(hdr);
      for (const m of gs.muscles.sort((a,b) => b.totalScore - a.totalScore)) {
        const row = document.createElement("div");
        row.className = "muscle-row";
        const col = m.totalScore >= 3 ? "var(--green)" : m.totalScore >= 1 ? "var(--accent-2)" : "var(--red)";
        row.innerHTML = `<div class="muscle-dot" style="background:${col}"></div><div class="name">${m.name_en}</div><div class="hits">${m.primaryHits||0}P = ${m.totalScore}</div>`;
        detail.appendChild(row);
      }
    }
  } catch (e) {
    console.error(e);
    if (!_bodyChart) initBodyChart(); // zeige leere Karte als Fallback
  }
}

$("#coverageDays").onchange = () => loadMuscleCoverage(Number($("#coverageDays").value));
$("#refreshCoverage").onclick = () => loadMuscleCoverage(Number($("#coverageDays").value));
