<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AlphaOS Fallback</title>
  <style>
    :root {
      --bg: #080b12; --bg2: #0c1019; --panel: #111827; --card: #151d2e;
      --line: #1e2d44; --ink: #eef1f8; --muted: #7b8ba5; --dim: #4a5874;
      --accent: #5eead4; --accent-glow: rgba(94,234,212,0.12); --accent-2: #f59e0b;
      --red: #ef4444; --green: #22c55e; --blue: #3b82f6;
      --glass: rgba(17,24,39,0.75); --glass-border: rgba(94,234,212,0.08);
      --radius: 12px; --radius-sm: 8px; --radius-xs: 4px;
      --font: "Inter", system-ui, -apple-system, sans-serif;
      --mono: "JetBrains Mono", "Fira Code", monospace;
      --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    [data-theme="latte"] {
      --bg: #f5f0e8; --bg2: #ebe5db; --panel: #e2dbd0; --card: #f0ebe3;
      --line: #cdc4b6; --ink: #1e1c19; --muted: #6b6356; --dim: #9a9080;
      --accent: #0e7a73; --accent-glow: rgba(14,122,115,0.08); --accent-2: #d97706;
      --red: #dc2626; --green: #16a34a; --blue: #2563eb;
    }
    [data-theme="nordic"] {
      --bg: #2e3440; --bg2: #3b4252; --panel: #434c5e; --card: #3b4252;
      --line: #4c566a; --ink: #eceff4; --muted: #d8dee9; --dim: #818996;
      --accent: #88c0d0; --accent-glow: rgba(136,192,208,0.15);
    }
    [data-theme="dracula"] {
      --bg: #282a36; --bg2: #343746; --panel: #44475a; --card: #343746;
      --line: #44475a; --ink: #f8f8f2; --muted: #6272a4; --dim: #44475a;
      --accent: #bd93f9; --accent-glow: rgba(189,147,249,0.15); --accent-2: #ffb86c;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; -webkit-tap-highlight-color: transparent; }
    body { font: 13px/1.5 var(--font); background: var(--bg); color: var(--ink);
      height: 100%; overflow: hidden; display: flex; flex-direction: column; }
    #app { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding-top: var(--safe-top); }
    .topbar { display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px; background: var(--glass); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border); z-index: 20; min-height: 48px; }
    .topbar .brand { display: flex; align-items: center; gap: 8px; font-weight: 800;
      font-size: 15px; letter-spacing: -0.02em; font-family: var(--mono); color: var(--accent); }
    .topbar-actions button { background: var(--bg2); border: 1px solid var(--line);
      color: var(--muted); border-radius: var(--radius-sm); padding: 5px 9px;
      font: inherit; font-size: 11px; font-weight: 700; cursor: pointer; }
    .view-container { flex: 1; overflow-y: auto; overflow-x: hidden; }
    .view { display: none; padding: 12px 12px 100px; max-width: 680px; margin: 0 auto; width: 100%; }
    .view.active { display: block; }
    .bottom-nav { display: flex; background: var(--glass); backdrop-filter: blur(24px);
      border-top: 1px solid var(--glass-border); padding: 4px 6px calc(4px + var(--safe-bottom)); }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 1px; padding: 4px; border-radius: var(--radius-sm); cursor: pointer;
      color: var(--dim); font-size: 9px; font-weight: 700; text-transform: uppercase; border: none; background: none; }
    .nav-item.active { color: var(--accent); }
    .nav-item svg { width: 20px; height: 20px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 14px; margin-bottom: 12px; }
    .card h2 { font-size: 14px; font-weight: 800; margin-bottom: 10px; color: var(--accent); font-family: var(--mono); }
    .card h3 { font-size: 10px; color: var(--muted); font-weight: 800; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.12em; }
    .hero-grid { display: grid; grid-template-columns: 110px 1fr; gap: 16px; align-items: center; }
    .ring-box { position: relative; width: 100px; aspect-ratio: 1; filter: drop-shadow(0 0 10px var(--accent-glow)); }
    .ring-box svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .ring-box .bg-ring { fill: none; stroke: var(--line); stroke-width: 12; }
    .ring-box .fg-ring { fill: none; stroke: url(#ringGrad); stroke-width: 12; stroke-linecap: round;
      stroke-dasharray: 339; stroke-dashoffset: 339; transition: stroke-dashoffset 600ms cubic-bezier(0.4,0,0.2,1); }
    .ring-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .ring-label .pct { font-size: 22px; font-weight: 900; color: var(--accent); font-family: var(--mono); }
    .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-pill { background: var(--bg2); border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 8px 12px; }
    .stat-pill .label { font-size: 9px; color: var(--muted); font-weight: 800; }
    .stat-pill .val { font-size: 14px; font-weight: 800; font-family: var(--mono); }
    .habit-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .habit-chip { padding: 5px 10px; border-radius: 16px; font-size: 10px; font-weight: 800;
      border: 1px solid var(--line); background: var(--bg2); cursor: pointer; font-family: var(--mono); }
    .habit-chip.done { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
    .heatmap { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .heatmap-cell { aspect-ratio: 1; border-radius: var(--radius-xs); border: 1px solid var(--line);
      background: var(--bg2); display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 800; font-family: var(--mono); }
    .block-grid { display: grid; gap: 6px; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); }
    .block-btn { background: var(--bg2); border: 1px solid var(--line); border-radius: var(--radius-sm);
      padding: 8px; text-align: center; cursor: pointer; color: var(--ink); font-weight: 800; font-size: 12px; }
    .block-btn.active { border-color: var(--accent); background: var(--accent-glow); }
    .ex-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    .ex-table th { text-align: left; padding: 4px; font-size: 9px; color: var(--dim); border-bottom: 1px solid var(--line); }
    .ex-table td { padding: 3px; }
    .ex-table input { width: 100%; padding: 6px 8px; background: var(--bg2); border: 1px solid var(--line);
      border-radius: var(--radius-xs); color: var(--ink); font: 12px var(--font); }
    .bodymap-container { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .bodymap-toggle { display: flex; gap: 4px; background: var(--bg2); border: 1px solid var(--line); padding: 3px; border-radius: var(--radius-sm); }
    .bodymap-toggle button { padding: 4px 12px; border: none; background: none; color: var(--muted); font: 10px var(--font); font-weight: 800; cursor: pointer; }
    .bodymap-toggle button.active { background: var(--accent); color: #062026; border-radius: 6px; }
    #bodymapChart { width: 100%; max-width: 280px; min-height: 360px; }
    textarea, input[type=date], select { width: 100%; padding: 8px 12px; background: var(--bg2); border: 1px solid var(--line); border-radius: var(--radius-sm); color: var(--ink); }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 14px; border-radius: var(--radius-sm); font-weight: 800; cursor: pointer; border: none; text-transform: uppercase; }
    .btn-primary { background: var(--accent); color: #062026; }
    .btn-secondary { background: var(--bg2); border: 1px solid var(--line); color: var(--ink); }
    .toast { position: fixed; bottom: 64px; left: 50%; transform: translateX(-50%); background: var(--panel); color: var(--ink); padding: 8px 14px; border: 1px solid var(--accent); opacity: 0; transition: 200ms; z-index: 100; font-family: var(--mono); }
    .toast.show { opacity: 1; }
    .popup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 199; }
    .muscle-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: var(--panel); border: 1px solid var(--accent); padding: 18px; width: 90%; max-width: 480px; z-index: 200; border-radius: var(--radius); }
    .muscle-popup .close-btn { position: absolute; top: 10px; right: 14px; background: none; border: none; color: var(--muted); font-size: 20px; }
    .slog-item { display: flex; justify-content: space-between; padding: 8px 12px; background: var(--bg2); border: 1px solid var(--line); border-radius: var(--radius-sm); margin-bottom: 4px; }
    .hidden { display: none !important; }
    .fade-in { animation: fadeIn 300ms ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="brand"><span>ALPHA OS</span></div>
    <div class="topbar-actions"><button id="themeBtn">MOCHA</button></div>
  </div>
  <div class="view-container">
    <div class="view active" id="view-dash">
      <div class="card fade-in">
        <div class="hero-grid">
          <div class="ring-box"><svg viewBox="0 0 120 120"><defs><linearGradient id="ringGrad"><stop offset="0%" stop-color="var(--accent)"/><stop offset="100%" stop-color="var(--accent-2)"/></linearGradient></defs><circle class="bg-ring" cx="60" cy="60" r="54"/><circle class="fg-ring" cx="60" cy="60" r="54" id="heroRing"/></svg><div class="ring-label"><div class="pct" id="heroPct">0%</div></div></div>
          <div class="stat-row">
            <div class="stat-pill"><div class="label">Date</div><div class="val" id="heroDate">--</div></div>
            <div class="stat-pill"><div class="label">Week</div><div class="val" id="heroWeekScore">0</div></div>
          </div>
        </div>
      </div>
      <div class="card fade-in"><h3>Habits</h3><div class="habit-row" id="habitList"></div></div>
      <div class="card fade-in"><h3>Week</h3><div class="heatmap" id="weekHeatmap"></div></div>
      <div class="card fade-in"><h3>Plan</h3><div class="block-grid" id="blockGrid"></div></div>
      <div class="card fade-in"><h3>Sessions</h3><div id="recentLog"></div></div>
    </div>
    <div class="view" id="view-session">
      <div class="card">
        <h2>Session</h2>
        <div style="display:flex;gap:8px;margin-bottom:8px"><input type="date" id="sessDate" style="flex:1" /><button class="btn btn-primary" id="sessSave">Save</button></div>
        <h3>Split</h3><div class="block-grid mb-8" id="sessBlockGrid"></div>
        <div style="overflow-x:auto"><table class="ex-table"><thead><tr><th>Name</th><th>H</th><th>S</th><th>R</th><th>kg</th><th></th></tr></thead><tbody id="exRows"></tbody></table></div>
        <button class="btn btn-secondary btn-sm mt-8" id="addExRow">+ Row</button>
      </div>
    </div>
    <div class="view" id="view-journal">
      <div class="card"><h2>Journal</h2><div style="display:flex;gap:8px;margin-bottom:8px"><input type="date" id="jDate" style="flex:1" /><button class="btn btn-primary" id="jSave">Save</button></div><textarea id="jText"></textarea></div>
      <div class="card"><h3>History</h3><div id="jList"></div></div>
    </div>
    <div class="view" id="view-muscles">
      <div class="card">
        <h2>Muscles</h2>
        <div class="bodymap-container"><div class="bodymap-toggle"><button class="active" id="btnFront">Front</button><button id="btnBack">Back</button></div><div id="bodymapChart"></div></div>
      </div>
      <div class="card"><h3>Anatomy</h3><div id="muscleDetail"></div></div>
    </div>
  </div>
  <nav class="bottom-nav">
    <button class="nav-item active" data-view="dash"><span>Dash</span></button>
    <button class="nav-item" data-view="session"><span>Sess</span></button>
    <button class="nav-item" data-view="journal"><span>Jour</span></button>
    <button class="nav-item" data-view="muscles"><span>Musc</span></button>
  </nav>
</div>
<div class="toast" id="toast"></div>
<div class="popup-overlay hidden" id="teachingOverlay"></div>
<div class="muscle-popup hidden" id="teachingPopup"><button class="close-btn" id="closeTeaching">×</button><div id="teachingContent"></div></div>
<script src="./lib/body-muscles.js"></script>
<script type="module">
const API = location.origin;
const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const state = { blocks: [], session: { exercises: [], block: "" }, theme: "mocha" };
function today() { return new Date().toISOString().split('T')[0]; }
async function api(p, o) { const r = await fetch(API+p, o); return r.json(); }
function toast(m) { const e=$("#toast"); e.textContent=m; e.classList.add("show"); setTimeout(()=>e.classList.remove("show"),2000); }
const views=$$(".view"), navs=$$(".nav-item");
function switchView(n) {
  views.forEach(v=>v.classList.toggle("active",v.id===`view-${n}`));
  navs.forEach(i=>i.classList.toggle("active",i.dataset.view===n));
  if(n==="dash") loadHabits();
}
navs.forEach(n=>n.onclick=()=>{ switchView(n.dataset.view); if(n.dataset.view==="muscles" && !_bodyChart) loadMuscles(); });
const THEMES=["mocha","latte","nordic","dracula"];
function applyTheme(t) { document.documentElement.setAttribute("data-theme",t); $("#themeBtn").textContent=t.toUpperCase(); state.theme=t; localStorage.setItem("fitness-theme",t); }
$("#themeBtn").onclick=()=>{ applyTheme(THEMES[(THEMES.indexOf(state.theme)+1)%THEMES.length]); };
async function loadHabits() {
  const el=$("#habitList"); el.innerHTML="";
  try {
    const r=await api("/habitsync/habits");
    if(Array.isArray(r)) r.forEach(h=>{
      const c=document.createElement("div"); c.className="habit-chip"+(h.value>=1?" done":""); c.textContent=h.name;
      c.onclick=async()=>{ await api(`/habitsync/record/${h.uuid}`,{method:"POST"}); toast(h.name+" ✓"); loadHabits(); };
      el.appendChild(c);
    });
  } catch(e){}
}
let _bodyChart=null, _bodySide="FRONT";
const G2S = { chest:["pectoralis-major-left","pectoralis-major-right"], back:["latissimus-dorsi-left","latissimus-dorsi-right","rhomboids"], shoulders:["anterior-deltoid-left","anterior-deltoid-right"], arms:["biceps-brachii-left","triceps-brachii-long-left"], core:["rectus-abdominis"], glutes:["gluteus-maximus-left"], quads:["rectus-femoris-left"], hamstrings:["biceps-femoris-left"], calves:["gastrocnemius-left"] };
async function loadMuscles() {
  if(!_bodyChart) _bodyChart=new BodyMuscles.BodyChart($("#bodymapChart"),{view:_bodySide,onMuscleClick:s=>{const g=Object.entries(G2S).find(([,sl])=>sl.includes(s))?.[0]; if(g) showTeach(g);}});
  try {
    const r=await api("/coverage/detailed?days=7"); const gs=r.groups||[]; const st={};
    gs.forEach(g=>{ const avg=g.muscles.reduce((s,m)=>s+m.totalScore,0)/Math.max(g.muscles.length,1); const i=Math.min(10,Math.round(avg*2.5)); (G2S[g.id]||[]).forEach(s=>st[s]={intensity:i}); });
    _bodyChart.update({view:_bodySide,bodyState:st});
    $("#muscleDetail").innerHTML=gs.filter(g=>g.muscles.some(m=>m.totalScore>0)).map(g=>`<div style="margin-bottom:8px"><div style="font-weight:800;color:var(--accent)">${g.id.toUpperCase()}</div>${g.muscles.filter(m=>m.totalScore>0).slice(0,3).map(m=>`<div class="text-xs muted">${m.name_en}: ${m.totalScore}</div>`).join("")}</div>`).join("");
  } catch(e){}
}
async function showTeach(id) {
  $("#teachingOverlay").classList.remove("hidden"); $("#teachingPopup").classList.remove("hidden");
  try { const r=await api(`/exercise/${id}/teaching`); if(r.ok&&r.lesson) $("#teachingContent").innerHTML=`<h2>${r.lesson.name||id}</h2><div style="font-family:var(--mono);font-size:11px;white-space:pre-wrap">${r.lesson.content||r.lesson.text}</div>`; else $("#teachingContent").innerHTML="No lesson."; } catch(e){ $("#teachingContent").innerHTML="Error."; }
}
$("#closeTeaching").onclick=()=>{$("#teachingOverlay").classList.add("hidden"); $("#teachingPopup").classList.add("hidden");};
$("#btnFront").onclick=()=>{_bodySide="FRONT"; $("#btnFront").classList.add("active"); $("#btnBack").classList.remove("active"); loadMuscles();};
$("#btnBack").onclick=()=>{_bodySide="BACK"; $("#btnBack").classList.add("active"); $("#btnFront").classList.remove("active"); loadMuscles();};
async function loadDashboard() {
  const d=today(); $("#heroDate").textContent=d; $("#sessDate").value=d; $("#jDate").value=d;
  const b=await api("/blocks").catch(()=>({blocks:[{id:"push",label:"Push"}]})); state.blocks=b.blocks;
  [$("#blockGrid"),$("#sessBlockGrid")].forEach(el=>{ el.innerHTML=""; state.blocks.forEach(bk=>{ const btn=document.createElement("button"); btn.className="block-btn"; btn.textContent=bk.label; btn.onclick=()=>{state.session.block=bk.id; $$(".block-btn").forEach(x=>x.classList.toggle("active",x.textContent===bk.label)); const p=state.session.block?1:0; $("#heroRing").style.strokeDashoffset=(339*(1-p)).toFixed(0); $("#heroPct").textContent=p?"100%":"0%";}; el.appendChild(btn); }); });
  try { const r=await api("/journal/list"); $("#recentLog").innerHTML=(r.entries||[]).slice(0,5).map(e=>`<div class="slog-item"><div class="date">${e.date}</div><div class="tag">LOG</div></div>`).join(""); } catch(e){}
}
(async()=>{ applyTheme(localStorage.getItem("fitness-theme")||"mocha"); await loadDashboard(); loadHabits(); })();
</script>
</body>
</html>
